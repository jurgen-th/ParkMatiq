<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="clip">
      <rect width="512" height="512" rx="90"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="512" height="512" fill="#1B45C8"/>

    <!-- Large white P -->
    <text x="48" y="390"
          font-family="Arial Black, Arial, sans-serif"
          font-weight="900"
          font-size="400"
          fill="white">P</text>

    <!-- Yellow map pin -->
    <circle cx="378" cy="148" r="68" fill="#FFD600"/>
    <circle cx="378" cy="148" r="30" fill="#1B45C8"/>
    <polygon points="350,205 378,268 406,205" fill="#FFD600"/>

    <!-- Yellow car body -->
    <rect x="72" y="358" width="318" height="82" rx="22" fill="#FFD600"/>
    <!-- Car roof -->
    <rect x="124" y="306" width="208" height="68" rx="14" fill="#FFD600"/>
    <!-- Windows -->
    <rect x="138" y="314" width="82" height="50" rx="8" fill="#1B45C8" opacity="0.28"/>
    <rect x="234" y="314" width="82" height="50" rx="8" fill="#1B45C8" opacity="0.28"/>
    <!-- Wheels -->
    <circle cx="148" cy="446" r="32" fill="#0F2F8C"/>
    <circle cx="148" cy="446" r="15" fill="#FFD600"/>
    <circle cx="322" cy="446" r="32" fill="#0F2F8C"/>
    <circle cx="322" cy="446" r="15" fill="#FFD600"/>

    <!-- Bottom label -->
    <rect x="0" y="458" width="512" height="54" fill="#0F2F8C"/>
    <text x="256" y="498"
          text-anchor="middle"
          font-family="Arial Black, Arial, sans-serif"
          font-weight="900"
          font-size="34"
          fill="white">ParkWise</text>
  </g>
</svg>
