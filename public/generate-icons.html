<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>ParkWise — Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 32px; background: #f0f4ff; }
    h1 { color: #1B45C8; margin-bottom: 8px; }
    p { color: #555; margin-bottom: 24px; }
    canvas { display: none; }
    .btns { display: flex; gap: 12px; flex-wrap: wrap; }
    button {
      background: #1B45C8; color: white; border: none;
      padding: 12px 24px; border-radius: 8px; font-size: 15px;
      font-weight: 600; cursor: pointer;
    }
    button:hover { background: #0F2F8C; }
  </style>
</head>
<body>
  <h1>ParkWise Icon Generator</h1>
  <p>Open this file in a browser, then click each button to download the PNG icons. Place the downloaded files in the <code>public/</code> folder.</p>

  <canvas id="c"></canvas>

  <div class="btns">
    <button onclick="generate(192, 'icon-192.png')">Download icon-192.png</button>
    <button onclick="generate(512, 'icon-512.png')">Download icon-512.png</button>
    <button onclick="generate(180, 'apple-touch-icon.png')">Download apple-touch-icon.png</button>
  </div>

  <script>
    function generate(size, filename) {
      const c = document.getElementById('c')
      c.width = size
      c.height = size
      const ctx = c.getContext('2d')
      const s = size / 512

      // Background with rounded corners
      const r = 90 * s
      ctx.beginPath()
      ctx.moveTo(r, 0)
      ctx.lineTo(size - r, 0)
      ctx.quadraticCurveTo(size, 0, size, r)
      ctx.lineTo(size, size - r)
      ctx.quadraticCurveTo(size, size, size - r, size)
      ctx.lineTo(r, size)
      ctx.quadraticCurveTo(0, size, 0, size - r)
      ctx.lineTo(0, r)
      ctx.quadraticCurveTo(0, 0, r, 0)
      ctx.closePath()
      ctx.fillStyle = '#1B45C8'
      ctx.fill()
      ctx.clip()

      // White P
      ctx.fillStyle = 'white'
      ctx.font = `900 ${400 * s}px "Arial Black", Arial, sans-serif`
      ctx.fillText('P', 48 * s, 390 * s)

      // Yellow map pin circle
      ctx.fillStyle = '#FFD600'
      ctx.beginPath()
      ctx.arc(378 * s, 148 * s, 68 * s, 0, Math.PI * 2)
      ctx.fill()

      // Pin hole
      ctx.fillStyle = '#1B45C8'
      ctx.beginPath()
      ctx.arc(378 * s, 148 * s, 30 * s, 0, Math.PI * 2)
      ctx.fill()

      // Pin tail
      ctx.fillStyle = '#FFD600'
      ctx.beginPath()
      ctx.moveTo(350 * s, 205 * s)
      ctx.lineTo(378 * s, 268 * s)
      ctx.lineTo(406 * s, 205 * s)
      ctx.closePath()
      ctx.fill()

      // Car body
      ctx.fillStyle = '#FFD600'
      roundRect(ctx, 72 * s, 358 * s, 318 * s, 82 * s, 22 * s)
      ctx.fill()

      // Car roof
      roundRect(ctx, 124 * s, 306 * s, 208 * s, 68 * s, 14 * s)
      ctx.fill()

      // Windows
      ctx.fillStyle = 'rgba(15,47,140,0.28)'
      roundRect(ctx, 138 * s, 314 * s, 82 * s, 50 * s, 8 * s)
      ctx.fill()
      roundRect(ctx, 234 * s, 314 * s, 82 * s, 50 * s, 8 * s)
      ctx.fill()

      // Wheels outer
      ctx.fillStyle = '#0F2F8C'
      circle(ctx, 148 * s, 446 * s, 32 * s)
      circle(ctx, 322 * s, 446 * s, 32 * s)

      // Wheels inner
      ctx.fillStyle = '#FFD600'
      circle(ctx, 148 * s, 446 * s, 15 * s)
      circle(ctx, 322 * s, 446 * s, 15 * s)

      // Bottom label
      ctx.fillStyle = '#0F2F8C'
      ctx.fillRect(0, 458 * s, size, 54 * s)

      // ParkWise text
      ctx.fillStyle = 'white'
      ctx.font = `900 ${34 * s}px "Arial Black", Arial, sans-serif`
      ctx.textAlign = 'center'
      ctx.fillText('ParkWise', size / 2, 498 * s)

      // Download
      const a = document.createElement('a')
      a.href = c.toDataURL('image/png')
      a.download = filename
      a.click()
    }

    function circle(ctx, x, y, r) {
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fill()
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.lineTo(x + w - r, y)
      ctx.quadraticCurveTo(x + w, y, x + w, y + r)
      ctx.lineTo(x + w, y + h - r)
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
      ctx.lineTo(x + r, y + h)
      ctx.quadraticCurveTo(x, y + h, x, y + h - r)
      ctx.lineTo(x, y + r)
      ctx.quadraticCurveTo(x, y, x + r, y)
      ctx.closePath()
    }
  </script>
</body>
</html>
